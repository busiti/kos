<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Kos Bu Siti - Pembayaran</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="data:,">
  <script type="module">
    import { auth } from "./js/firebase.js"; // Pastikan path ke firebase.js benar
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

    // Cek status login sebelum halaman ditampilkan sepenuhnya
    onAuthStateChanged(auth, (user) => {
      if (!user) {
        // Jika tidak login, langsung lempar ke halaman login
        window.location.href = "login.html";
      }
    });
  </script>
</head>
<body class="bg-[#0b1220] text-[#e8f0ff] font-sans min-h-screen">
  <nav class="sticky top-0 z-50 bg-[#0b1220]/90 backdrop-blur-md border-b border-white/10">
    <div class="max-w-6xl mx-auto px-4 py-4 flex flex-wrap justify-between items-center gap-4">
      <div class="font-bold text-lg text-emerald-400">🏠 Kos Bu Siti</div>
      <div class="flex flex-wrap gap-2">
        <a href="index.html" class="px-4 py-2 rounded-full border border-white/10 bg-white/5 text-sm hover:bg-white/10 transition">Dashboard</a>
        <a href="payments.html" class="px-4 py-2 rounded-full border border-emerald-500/30 bg-emerald-500/10 text-sm">Pembayaran</a>
        <a href="rekap.html" class="px-4 py-2 rounded-full border border-white/10 bg-white/5 text-sm hover:bg-white/10 transition">Rekap</a>
        <a href="history.html" class="px-4 py-2 rounded-full border border-white/10 bg-white/5 text-sm hover:bg-white/10 transition">Riwayat</a>
      </div>
    </div>
  </nav>

  <main class="max-w-4xl mx-auto p-4 space-y-4">
    <div class="bg-[#111a2e] border border-white/10 rounded-2xl p-6 shadow-lg">
      <h2 class="text-2xl font-bold tracking-tight">Pembayaran</h2>
      <p class="text-[#8aa0c6] text-sm italic">Input: penyewa, jumlah bulan, tanggal bayar. Periode ditentukan otomatis.</p>
    </div>

    <div class="bg-[#111a2e] border border-white/10 rounded-2xl p-6 space-y-6 shadow-xl">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="space-y-2">
          <label class="text-xs text-[#8aa0c6] uppercase tracking-wider font-semibold">Pilih Penyewa</label>
          <select id="tenantSelect" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 focus:ring-2 focus:ring-emerald-500 outline-none transition"></select>
        </div>
        <div class="space-y-2">
          <label class="text-xs text-[#8aa0c6] uppercase tracking-wider font-semibold">Tanggal Bayar</label>
          <input id="payDate" type="date" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 focus:ring-2 focus:ring-emerald-500 outline-none transition"/>
        </div>
        <div class="space-y-2">
          <label class="text-xs text-[#8aa0c6] uppercase tracking-wider font-semibold">Jumlah Bulan Dibayar</label>
          <input id="months" type="number" min="1" value="1" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 focus:ring-2 focus:ring-emerald-500 outline-none transition"/>
        </div>
        <div class="space-y-2">
          <label class="text-xs text-[#8aa0c6] uppercase tracking-wider font-semibold">Preview Periode</label>
          <input id="preview" type="text" readonly class="w-full bg-white/10 border border-white/10 rounded-xl p-3 text-emerald-400 font-medium cursor-not-allowed italic shadow-inner"/>
        </div>
      </div>

      <div class="pt-6 border-t border-white/10 flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="text-[#8aa0c6] text-sm italic" id="hint">—</div>
        <button id="btnSave" class="w-full md:w-auto bg-emerald-800 hover:bg-emerald-700 text-white px-10 py-3 rounded-xl font-bold transition-all transform active:scale-95 shadow-lg">
          Simpan Pembayaran
        </button>
      </div>

      <div id="after" style="display:none" class="mt-4 p-4 bg-emerald-900/30 border border-emerald-500/30 rounded-xl text-emerald-200 text-center text-sm"></div>
    </div>
  </main>

  <script type="module" src="./js/payments.js"></script>
</body>
</html>
