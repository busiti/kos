<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kos Bu Siti - Pembayaran</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module">
    import { auth } from "./js/firebase.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

    onAuthStateChanged(auth, (user) => {
      if (!user) window.location.href = "login.html";
    });
  </script>
</head>
<body class="bg-[#0b1220] text-[#e8f0ff] font-sans min-h-screen pb-10">
  <nav class="sticky top-0 z-50 bg-[#0b1220]/90 backdrop-blur-md border-b border-white/10">
    <div class="max-w-6xl mx-auto px-4 py-4 flex flex-wrap justify-between items-center gap-4">
      <div class="font-bold text-lg text-emerald-400">🏠 Kos Bu Siti</div>
      <div class="flex flex-wrap gap-2">
        <a href="index.html" class="px-4 py-2 rounded-full border border-white/10 bg-white/5 text-sm hover:bg-white/10 transition">Dashboard</a>
        <a href="payments.html" class="px-4 py-2 rounded-full border border-emerald-500/30 bg-emerald-500/10 text-sm">Pembayaran</a>
        <a href="rekap.html" class="px-4 py-2 rounded-full border border-white/10 bg-white/5 text-sm hover:bg-white/10 transition">Penyewa</a>
        <a href="history.html" class="px-4 py-2 rounded-full border border-white/10 bg-white/5 text-sm hover:bg-white/10 transition">Riwayat</a>
      </div>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto p-4 space-y-6">
    <!-- FORM PEMBAYARAN -->
    <div class="bg-[#111a2e] border border-white/10 rounded-2xl p-6 shadow-xl">
      <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
        <span class="w-2 h-2 bg-blue-500 rounded-full"></span> Input Pembayaran
      </h2>

      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
        <div class="space-y-1">
          <label class="text-[11px] text-[#8aa0c6] uppercase font-bold">Pilih Penyewa</label>
          <select id="tenantSelect" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 outline-none focus:ring-1 focus:ring-emerald-500"></select>
        </div>

        <div class="space-y-1">
          <label class="text-[11px] text-[#8aa0c6] uppercase font-bold">Tanggal Bayar</label>
          <input id="payDate" type="date" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 outline-none focus:ring-1 focus:ring-emerald-500" />
        </div>

        <div class="space-y-1">
          <label class="text-[11px] text-[#8aa0c6] uppercase font-bold">Jumlah Bulan</label>
          <input id="months" type="number" min="1" value="1" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 outline-none focus:ring-1 focus:ring-emerald-500" />
        </div>

        <div class="space-y-1">
          <label class="text-[11px] text-[#8aa0c6] uppercase font-bold">Preview Periode</label>
          <input id="preview" readonly class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-[#8aa0c6] outline-none" />
        </div>
      </div>

      <div class="mt-6 flex flex-col md:flex-row items-center justify-between gap-4 border-t border-white/5 pt-6">
        <div id="hint" class="text-sm text-[#8aa0c6] italic">—</div>
        <button id="btnSave" class="w-full md:w-auto bg-emerald-800 hover:bg-emerald-700 px-8 py-3 rounded-xl font-bold transition shadow-lg">
          Simpan Pembayaran
        </button>
      </div>

      <div id="after" class="hidden mt-4 p-4 rounded-xl bg-emerald-500/10 border border-emerald-500/20 text-emerald-200 text-sm text-center"></div>
    </div>

    <!-- SUMMARY -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
      <div class="bg-slate-800/40 p-5 rounded-2xl border border-white/5 text-center">
        <div class="text-[#8aa0c6] text-[10px] uppercase font-bold mb-1">Total Kamar</div>
        <div class="text-2xl font-bold" id="sumTotal">0</div>
      </div>

      <div class="bg-emerald-900/30 p-5 rounded-2xl border border-emerald-500/20 text-center">
        <div class="text-emerald-400 text-[10px] uppercase font-bold mb-1">Sudah Bayar</div>
        <div class="text-2xl font-bold text-emerald-100" id="sumPaid">0</div>
      </div>

      <div class="bg-red-900/30 p-5 rounded-2xl border border-red-500/20 text-center">
        <div class="text-red-400 text-[10px] uppercase font-bold mb-1">Belum Bayar</div>
        <div class="text-2xl font-bold text-red-100" id="sumUnpaid">0</div>
      </div>

      <div class="bg-slate-800/40 p-5 rounded-2xl border border-white/5 text-center">
        <div class="text-[#8aa0c6] text-[10px] uppercase font-bold mb-1">Pemasukan Bulan Ini</div>
        <div class="text-xl font-bold truncate">Rp <span id="sumIncome">0</span></div>
      </div>
    </div>

    <!-- TABEL REKAP -->
    <div class="bg-[#111a2e] border border-white/10 rounded-2xl p-6 shadow-xl overflow-hidden">
      <h3 class="text-lg font-bold mb-4 italic text-[#8aa0c6]">Rekap Pembayaran Tahun Berjalan</h3>

      <div class="overflow-x-auto rounded-xl border border-white/10">
        <table class="w-full text-xs text-center border-collapse" id="tblRekap">
          <thead id="thead" class="bg-white/5"></thead>
          <tbody id="tbodyRekap" class="divide-y divide-white/5"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script type="module" src="./js/payments.js"></script>
</body>
</html>
