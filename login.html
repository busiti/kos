<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Kos Bu Siti</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
</head>
<body class="bg-[#0b1220] text-white flex items-center justify-center min-h-screen">
    <div class="bg-[#111a2e] p-8 rounded-2xl border border-white/10 w-full max-w-sm shadow-2xl">
        <h1 class="text-2xl font-bold mb-6 text-center">🏠 Kos Bu Siti</h1>
        <div class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-[#8aa0c6] uppercase mb-1">Email</label>
                <input type="email" id="email" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 outline-none focus:ring-2 focus:ring-emerald-500">
            </div>
            <div>
                <label class="block text-xs font-bold text-[#8aa0c6] uppercase mb-1">Password</label>
                <input type="password" id="pass" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 outline-none focus:ring-2 focus:ring-emerald-500">
            </div>
            <button id="btnLogin" class="w-full bg-emerald-600 hover:bg-emerald-500 py-3 rounded-xl font-bold transition">Masuk</button>
            <p id="msg" class="text-red-400 text-xs text-center hidden"></p>
        </div>
    </div>

    <script type="module">
        import { auth } from './js/firebase.js';
        import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

        document.getElementById('btnLogin').onclick = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            const msg = document.getElementById('msg');

            try {
                await signInWithEmailAndPassword(auth, email, pass);
                window.location.href = 'index.html'; // Pindah ke dashboard setelah login
            } catch (err) {
                msg.innerText = "Email atau Password Salah";
                msg.classList.remove('hidden');
            }
        };
    </script>
</body>
</html>
